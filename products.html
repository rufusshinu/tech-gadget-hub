function showProducts(list){
  let grid=document.getElementById("products");
  grid.innerHTML="";
  list.forEach(p=>{
    grid.innerHTML+=`
      <div class="product-card">
        <img src="${p.img}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>${p.price}</p>
        <button onclick="openLinks('${p.amazon}','${p.flipkart}')">View</button>
      </div>
    `;
  });
}

function searchProduct(){
  let text=document.getElementById("search").value.toLowerCase();
  let filtered=products.filter(p => p.name.toLowerCase().includes(text));
  showProducts(filtered);
}

function openLinks(a,f){
  document.getElementById("amazonLink").href=a;
  document.getElementById("flipkartLink").href=f;
  document.getElementById("viewModal").style.display="flex";
}

function closeModal(){
  document.getElementById("viewModal").style.display="none";
}

showProducts(products);
</script>
